name: Release

on:
  push:
    branches:
      # semantic-release valid branches
      - '+([0-9])?(.{+([0-9]),x}).x'
      - 'main'
      - 'next'
      - 'next-major'
      - 'beta'
      - 'alpha'

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  verifications:
    name: Verifications
    permissions:
      contents: read
      id-token: write # required by Codecov in the reusable workflow
    uses: ./.github/workflows/verifications.yml

  build-release-artifact:
    name: Build release artifact
    runs-on: ubuntu-latest
    needs: [verifications]
    permissions:
      contents: read
    if: github.repository == 'testing-library/eslint-plugin-testing-library'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          cache: 'pnpm'
          node-version-file: '.nvmrc'

      - name: Install dependencies
        run: pnpm install --ignore-scripts

      - name: Build package
        run: pnpm run build

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-package-dist
          path: dist
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish package
    runs-on: ubuntu-latest
    needs: [build-release-artifact]
    permissions:
      id-token: write # to enable use of OIDC (npm trusted publishing and provenance)
      contents: write # to be able to publish a GitHub release
      issues: write # to be able to comment on released issues
      pull-requests: write # to be able to comment on released pull requests
    if: github.repository == 'testing-library/eslint-plugin-testing-library'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          registry-url: 'https://registry.npmjs.org'

      - name: Update npm
        run: npm install -g npm@~11.10.0

      - name: Download package artifact
        uses: actions/download-artifact@v4
        with:
          name: npm-package-dist
          path: dist

      - name: Release new version
        run: npx --yes semantic-release@25.0.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
