name: Verifications

on:
  workflow_call:

permissions:
  id-token: write # OIDC auth for Codecov

jobs:
  code-validation:
    name: 'Code Validation: ${{ matrix.validation-script }}'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        validation-script:
          [
            'lint',
            'type-check',
            'format:check',
            'validate-gen-all',
            'bundle-check',
          ]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0

      - name: Set up Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          cache: 'pnpm'
          node-version-file: '.nvmrc'

      - name: Install dependencies
        run: pnpm install

      - name: Run script
        run: pnpm run ${{ matrix.validation-script }}

  tests:
    name: Tests (Node v${{ matrix.node }} - ESLint v${{ matrix.eslint }})
    runs-on: ubuntu-latest
    timeout-minutes: 3
    strategy:
      fail-fast: false
      matrix:
        node: [18, 20, 21, 22, 23, 24]
        eslint: [8, 9, 10]
        exclude:
          - node: 18
            eslint: 10
          - node: 21
            eslint: 10
          - node: 23
            eslint: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0

      - name: Set up Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          cache: 'pnpm'
          node-version: ${{ matrix.node }}

      - name: Install dependencies
        run: pnpm install

      - name: Install ESLint v${{ matrix.eslint }}
        run: pnpm add eslint@${{ matrix.eslint }}

      - name: Run tests
        run: pnpm run test:ci

      - name: Upload tests coverage report
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        if: ${{ !cancelled() && github.event.action != 'closed' }}
        with:
          use_oidc: true
          report_type: 'coverage'

      - name: Upload tests result report
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        if: ${{ !cancelled() && github.event.action != 'closed' }}
        with:
          use_oidc: true
          report_type: 'test_results'
