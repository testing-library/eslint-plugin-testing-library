name: Verifications

on:
  workflow_call:

permissions:
  id-token: write # OIDC auth for Codecov

jobs:
  code-validation:
    name: 'Code Validation: ${{ matrix.validation-script }}'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        validation-script:
          [
            'lint',
            'type-check',
            'format:check',
            'validate-gen-all',
            'bundle-check',
          ]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          cache: 'pnpm'
          node-version-file: '.nvmrc'

      - name: Install dependencies
        run: pnpm install

      - name: Run script
        run: pnpm run ${{ matrix.validation-script }}

  tests:
    name: Tests (Node v${{ matrix.node }} - ESLint v${{ matrix.eslint }})
    runs-on: ubuntu-latest
    timeout-minutes: 3
    strategy:
      fail-fast: false
      matrix:
        node: [18, 20, 21, 22, 23, 24]
        eslint: [8, 9, 10]
        exclude:
          - node: 18
            eslint: 10
          - node: 21
            eslint: 10
          - node: 23
            eslint: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          cache: 'pnpm'
          node-version: ${{ matrix.node }}

      - name: Install dependencies
        run: pnpm install

      - name: Install ESLint v${{ matrix.eslint }}
        run: pnpm add eslint@${{ matrix.eslint }}

      - name: Run tests
        run: pnpm run test:ci

      - name: Upload tests coverage report
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v6.0.2
        if: ${{ !cancelled() && github.event.action != 'closed' }}
        with:
          use_oidc: true
          report_type: 'coverage'

      - name: Upload tests result report
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v6.0.2
        if: ${{ !cancelled() && github.event.action != 'closed' }}
        with:
          use_oidc: true
          report_type: 'test_results'
